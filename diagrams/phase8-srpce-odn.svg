<svg width="100%" viewBox="0 0 960 660" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <title>Phase 8 SR-PCE and ODN control-plane flow</title>
  <desc>An SR-PCE controller attached to R2 learns the topology via BGP-LS, R1 and R4 open PCEP sessions to it, R4 advertises a VPN route tagged with color 100 to R1, and R1's ODN template asks the PCE to compute a path, auto-building an SR-TE policy along R1-R2-R3-R4.</desc>

  <defs>
    <marker id="varrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5B4BC4"/>
    </marker>
  </defs>

  <style>
    .panel { fill:#F5F6F8; stroke:#E4E6EA; }
    .pe   { fill:#1D5FA5; stroke:#0C447C; }
    .p    { fill:#3F8FDD; stroke:#185FA5; }
    .ce   { fill:#1E9E76; stroke:#0F6E56; }
    .pce  { fill:#5B4BC4; stroke:#3C2F94; }
    .nname { fill:#FFFFFF; font-weight:700; }
    .nsub  { fill:#EAE9F8; }
    .dlink { stroke:#C4C9D1; stroke-width:2; fill:none; }
    .steer { stroke:#E08A2B; stroke-width:4.5; fill:none; }
    .ctrl  { stroke:#5B4BC4; stroke-width:2; stroke-dasharray:6 5; fill:none; }
    .ctrl2 { stroke:#5B4BC4; stroke-width:2.4; stroke-dasharray:6 5; fill:none; marker-end:url(#varrow); }
    .badge { fill:#5B4BC4; }
    .bnum  { fill:#FFFFFF; font-weight:700; }
    .head  { fill:#2B2B29; font-weight:700; }
    .sub   { fill:#7A7A72; }
    .leg   { fill:#44443F; }
    .clbl  { fill:#5B4BC4; font-weight:600; }
    .slbl  { fill:#B5650F; font-weight:600; }
  </style>

  <rect x="6" y="6" width="948" height="648" rx="16" class="panel"/>
  <text x="480" y="34" text-anchor="middle" font-size="17" class="head">Phase 8 — SR-PCE + ODN: control-plane flow</text>
  <text x="480" y="53" text-anchor="middle" font-size="11.5" class="sub">A colored route triggers the headend to ask the controller for a path — no hand-built policy</text>

  <!-- ===== DATA LINKS (under everything) ===== -->
  <line class="dlink" x1="100" y1="372" x2="120" y2="372"/>
  <line class="dlink" x1="240" y1="358" x2="352" y2="246"/>
  <line class="dlink" x1="240" y1="386" x2="352" y2="452"/>
  <line class="dlink" x1="410" y1="252" x2="410" y2="418"/>
  <line class="dlink" x1="470" y1="232" x2="688" y2="358"/>
  <line class="dlink" x1="470" y1="448" x2="688" y2="386"/>
  <line class="dlink" x1="810" y1="372" x2="850" y2="372"/>

  <!-- ===== STEERED PATH overlay (R1->R2->R3->R4) ===== -->
  <polyline class="steer" points="242,356 352,244 410,252 410,418 470,448 688,384"/>

  <!-- ===== CONTROL-PLANE FLOWS ===== -->
  <line class="ctrl2" x1="425" y1="192" x2="455" y2="116"/>
  <line class="ctrl" x1="222" y1="332" x2="388" y2="104"/>
  <line class="ctrl" x1="728" y1="332" x2="566" y2="104"/>
  <polyline class="ctrl2" points="748,392 748,512 196,512 196,392"/>
  <line class="ctrl2" x1="392" y1="100" x2="232" y2="318"/>

  <!-- ===== NODES ===== -->
  <g><rect x="370" y="46" width="210" height="66" rx="11" class="pce"/>
    <text x="475" y="74" text-anchor="middle" font-size="17" class="nname">SR-PCE</text>
    <text x="475" y="92" text-anchor="middle" font-size="10" class="nsub">controller · Lo0 5.5.5.5</text>
    <text x="475" y="105" text-anchor="middle" font-size="9.5" class="nsub">computes TE paths on request</text></g>
  <g><rect x="350" y="194" width="120" height="56" rx="9" class="p"/>
    <text x="410" y="218" text-anchor="middle" font-size="15" class="nname">R2</text>
    <text x="410" y="234" text-anchor="middle" font-size="9" class="nsub">P · BGP-LS producer</text></g>
  <g><rect x="120" y="330" width="122" height="58" rx="9" class="pe"/>
    <text x="181" y="356" text-anchor="middle" font-size="16" class="nname">R1</text>
    <text x="181" y="372" text-anchor="middle" font-size="9" class="nsub">PE · PCC · headend</text>
    <text x="181" y="383" text-anchor="middle" font-size="8.5" class="nsub">ODN color 100</text></g>
  <g><rect x="350" y="420" width="120" height="56" rx="9" class="p"/>
    <text x="410" y="444" text-anchor="middle" font-size="15" class="nname">R3</text>
    <text x="410" y="460" text-anchor="middle" font-size="9" class="nsub">P · core</text></g>
  <g><rect x="688" y="330" width="122" height="58" rx="9" class="pe"/>
    <text x="749" y="356" text-anchor="middle" font-size="16" class="nname">R4</text>
    <text x="749" y="372" text-anchor="middle" font-size="9" class="nsub">PE · PCC</text>
    <text x="749" y="383" text-anchor="middle" font-size="8.5" class="nsub">sets color 100</text></g>
  <g><rect x="22" y="349" width="78" height="46" rx="8" class="ce"/>
    <text x="61" y="369" text-anchor="middle" font-size="13" class="nname">CE1</text>
    <text x="61" y="383" text-anchor="middle" font-size="8.5" class="nsub">AS 65001</text></g>
  <g><rect x="850" y="349" width="78" height="46" rx="8" class="ce"/>
    <text x="889" y="369" text-anchor="middle" font-size="13" class="nname">CE2</text>
    <text x="889" y="383" text-anchor="middle" font-size="8.5" class="nsub">AS 65002</text></g>

  <!-- ===== STEP BADGES ===== -->
  <g><circle cx="453" cy="158" r="11" class="badge"/><text x="453" y="162" text-anchor="middle" font-size="12" class="bnum">1</text></g>
  <g><circle cx="300" cy="214" r="11" class="badge"/><text x="300" y="218" text-anchor="middle" font-size="12" class="bnum">2</text></g>
  <g><circle cx="648" cy="214" r="11" class="badge"/><text x="648" y="218" text-anchor="middle" font-size="12" class="bnum">2</text></g>
  <g><circle cx="472" cy="512" r="11" class="badge"/><text x="472" y="516" text-anchor="middle" font-size="12" class="bnum">3</text></g>
  <g><circle cx="276" cy="262" r="11" class="badge"/><text x="276" y="266" text-anchor="middle" font-size="12" class="bnum">4</text></g>

  <text x="486" y="150" font-size="9.5" class="clbl">BGP-LS</text>
  <text x="690" y="250" font-size="9.5" class="clbl">PCEP</text>
  <text x="470" y="528" font-size="9.5" class="clbl">VPNv4 + color 100</text>
  <text x="556" y="300" font-size="9.5" class="slbl">PCE-computed SR-TE path</text>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="556" width="14" height="14" rx="3" class="pce"/>
  <text x="50" y="567" font-size="10.5" class="leg">SR-PCE (controller)</text>
  <rect x="190" y="556" width="14" height="14" rx="3" class="pe"/>
  <text x="210" y="567" font-size="10.5" class="leg">PE / PCC (headend)</text>
  <rect x="345" y="556" width="14" height="14" rx="3" class="p"/>
  <text x="365" y="567" font-size="10.5" class="leg">P (core)</text>
  <line class="ctrl" x1="450" y1="563" x2="482" y2="563"/>
  <text x="488" y="567" font-size="10.5" class="leg">control plane (PCEP / BGP-LS)</text>
  <line class="steer" x1="700" y1="563" x2="732" y2="563"/>
  <text x="738" y="567" font-size="10.5" class="leg">ODN-steered data path</text>

  <text x="34" y="596" font-size="10.5" class="leg"><tspan class="clbl">1</tspan>  R2 exports the IS-IS topology to the SR-PCE via BGP-LS.</text>
  <text x="34" y="613" font-size="10.5" class="leg"><tspan class="clbl">2</tspan>  R1 and R4 open PCEP sessions to the SR-PCE (5.5.5.5).</text>
  <text x="34" y="630" font-size="10.5" class="leg"><tspan class="clbl">3</tspan>  R4 advertises CE2's VPN prefix tagged <tspan class="slbl">color 100</tspan> — it reaches R1.</text>
  <text x="34" y="647" font-size="10.5" class="leg"><tspan class="clbl">4</tspan>  R1's ODN template asks the PCE for a path → SR-TE policy auto-built (R1 to R2 to R3 to R4).</text>
</svg>
